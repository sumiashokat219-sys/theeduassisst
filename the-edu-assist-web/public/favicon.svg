<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Top text path (Center of green ring: radius 38) -->
    <path id="tP" d="M 12,50 A 38,38 0 0,1 88,50" />
    <!-- Bottom text path (Center of green ring: radius 38, CCW L-to-R for upright orientation) -->
    <path id="bP" d="M 12,50 A 38,38 0 0,0 88,50" />
  </defs>

  <!-- Outer White Border (3 units) -->
  <circle cx="50" cy="50" r="50" fill="white" />

  <!-- Outer Ring (Green - #79B64A) (18 units wide) -->
  <circle cx="50" cy="50" r="47" fill="#79B64A" />

  <!-- Inner White Border (3 units) -->
  <circle cx="50" cy="50" r="29" fill="white" />

  <!-- Inner Circle (Blue - #214A72) -->
  <circle cx="50" cy="50" r="26" fill="#214A72" />

  <!-- Circular Text -->
  <text fill="white" font-family="sans-serif" font-weight="800" font-size="6.4" letter-spacing="0.8">
    <textPath xlink:href="#tP" startOffset="50%" text-anchor="middle" dominant-baseline="central">THEEDUASSIST</textPath>
  </text>

  <text fill="white" font-family="sans-serif" font-weight="800" font-size="3.3" letter-spacing="0.4">
    <textPath xlink:href="#bP" startOffset="50%" text-anchor="middle" dominant-baseline="central" side="right">E-LEARNING DESIGN AGENCY</textPath>
  </text>

  <!-- Stars (5-point, Size 14) -->
  <polygon points="12,43 13.8,48.5 19,48.5 14.8,51.5 16.5,57 12,54 7.5,57 9.2,51.5 5,48.5 10.2,48.5" fill="white" />
  <polygon points="88,43 88.8,48.5 95,48.5 90.8,51.5 92.5,57 88,54 83.5,57 85.2,51.5 81,48.5 86.2,48.5" fill="white" />

  <!-- Center Icon Group (Simplified for favicon) -->
  <g stroke="white" stroke-width="0.5" opacity="0.4">
    <line x1="50" y1="50" x2="50" y2="35" />
    <line x1="50" y1="50" x2="65" y2="40" />
    <line x1="50" y1="50" x2="35" y2="40" />
    <circle cx="50" cy="35" r="1" fill="white" stroke="none" />
    <circle cx="65" cy="40" r="1" fill="white" stroke="none" />
    <circle cx="35" cy="40" r="1" fill="white" stroke="none" />
  </g>

  <g fill="white">
    <path d="M 38,40 L 50,35 L 62,40 L 50,45 Z" />
    <rect x="38" y="48" width="24" height="15" rx="1" fill="none" stroke="white" stroke-width="1.2" />
    <path d="M 35,66 Q 50,62 65,66 L 65,75 Q 50,71 35,75 Z" />
  </g>
</svg>
